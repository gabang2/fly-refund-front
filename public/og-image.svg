<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff08" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff08" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff08" stroke-width="1"/>

  <!-- Accent circle glow -->
  <circle cx="900" cy="315" r="280" fill="#3b82f610"/>
  <circle cx="900" cy="315" r="180" fill="#3b82f615"/>

  <!-- Airplane icon (simplified) -->
  <g transform="translate(820, 200) scale(1.8)" opacity="0.9">
    <path d="M 60 30 L 10 55 L 22 55 L 22 65 L 35 60 L 35 55 L 50 55 L 60 65 L 70 65 L 60 55 L 75 55 L 85 45 L 75 35 L 60 35 Z" fill="url(#accent)" opacity="0.85"/>
  </g>

  <!-- Dashed flight path -->
  <path d="M 120 400 Q 500 200 900 290" stroke="#3b82f640" stroke-width="2" stroke-dasharray="12,8" fill="none"/>

  <!-- Departure dot -->
  <circle cx="120" cy="400" r="6" fill="#3b82f6"/>
  <!-- Arrival dot -->
  <circle cx="900" cy="290" r="6" fill="#60a5fa"/>

  <!-- Badge: Up to €600 -->
  <rect x="880" y="370" width="240" height="64" rx="12" fill="#3b82f6"/>
  <text x="1000" y="396" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#bfdbfe" text-anchor="middle">Up to</text>
  <text x="1000" y="424" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#ffffff" text-anchor="middle">€600 / $1,350</text>

  <!-- Main headline -->
  <text x="100" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="900" fill="#ffffff" letter-spacing="-1">Flight canceled?</text>
  <text x="100" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="900" fill="url(#accent)" letter-spacing="-1">Get compensated.</text>

  <!-- Subtext -->
  <text x="100" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94a3b8">Free calculator · EU261 · US DOT · and more</text>

  <!-- Logo -->
  <rect x="100" y="480" width="160" height="44" rx="8" fill="#ffffff10"/>
  <text x="180" y="509" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">✈ FlyRefund</text>

  <!-- URL -->
  <text x="100" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#475569">fly-refund-check.vercel.app</text>
</svg>
